<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
</head>
<body>
    <script src="js/preloader.js"></script>
    <!-- Connection banner -->
    <div class="conn-banner" id="connBanner">
        Agente local desconectado — <a href="settings.html">configurar tunnel</a>
    </div>

    <div class="app-shell">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">
                        <svg fill="none" viewBox="0 0 99 99"><path d="M98.9485 98.2746C98.9485 98.6491 98.6491 98.9486 98.2746 98.9486H0.674C0.3 98.9486 0 98.6491 0 98.2746V0.674C0 0.3 0.3 0 0.674 0H98.2746C98.6491 0 98.9485 0.3 98.9485 0.674V98.2746ZM20.4456 86.5464L30.856 93.4365C31.395 93.796 32.024 93.9907 32.668 93.9907H93.4215C93.871 93.9907 94.23 93.6312 94.23 93.182V5.587C94.23 5.003 93.766 4.539 93.197 4.539L44.831 4.688C44.337 4.688 43.977 5.153 44.097 5.632C44.112 5.692 44.322 5.827 44.726 6.036C45.026 6.201 45.31 6.621 45.565 7.31C48.471 15.009 45.1 18.274 38.315 22.123C33.238 25.014 28.999 27.396 25.613 29.268C24.894 29.673 24.864 30.691 25.568 31.111C31.335 34.601 36.263 37.866 40.337 40.937C44.247 43.887 45.385 47.917 43.723 53.024C43.363 54.133 41.655 56.095 40.951 57.443C40.697 57.937 40.817 58.551 41.266 58.896C44.007 61.053 45.086 64.004 44.486 67.763C44.082 70.265 42.27 72.496 39.049 74.444C34.046 77.469 28.339 80.63 20.476 85.423C20.056 85.678 20.041 86.277 20.446 86.546ZM23.696 4.688H5.767C5.302 4.688 4.913 5.078 4.913 5.542V93.242C4.913 93.661 5.242 93.991 5.662 93.991H10.605C11.054 93.991 11.399 93.571 11.309 93.137C10.979 91.474 11.279 89.377 12.192 86.846C12.357 86.412 12.432 85.947 12.447 85.498C12.462 85.019 12.073 83.041 11.279 79.551C10.051 74.129 12.357 70.474 16.836 66.969C21.165 63.569 25.568 60.663 30.017 58.252C30.616 57.922 30.661 57.083 30.092 56.709L17.66 48.471C17.495 48.366 17.36 48.231 17.24 48.096C12.223 41.91 11.848 36.188 16.102 30.901C16.551 30.332 16.596 29.553 16.207 28.939C11.878 22.243 11.833 15.398 17.914 10.275C19.712 8.762 21.734 7.19 23.981 5.587C24.37 5.302 24.175 4.688 23.696 4.688Z" fill="hsl(45, 5%, 10%)"/></svg>
                    </div>
                    <span class="sidebar-brand-text">Content Studio</span>
                </div>
                <button class="sidebar-new-btn" onclick="createNewProject()">
                    <span>+</span> Novo documento
                </button>
            </div>

            <div class="sidebar-nav">
                <a class="sidebar-nav-item active" href="app.html">
                    <span class="nav-icon">W</span> Workspace
                </a>
                <a class="sidebar-nav-item" href="settings.html">
                    <span class="nav-icon">S</span> Configurações
                </a>
            </div>

            <div class="sidebar-label">Documentos</div>

            <div class="sidebar-files" id="fileList">
                <!-- populated by JS -->
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-avatar" id="sidebarAvatar" onclick="Auth.logout()">P</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarName">Dr. Paulo</div>
                    <div class="sidebar-user-role" id="sidebarRole">admin</div>
                </div>
                <button class="sidebar-logout" onclick="Auth.logout()" title="Sair">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-area">
            <!-- Topbar -->
            <div class="topbar">
                <div class="topbar-left">
                    <input type="text" class="topbar-title" id="docTitle" placeholder="Sem título" oninput="autoSave()">
                </div>
                <div class="topbar-right">
                    <span class="topbar-tag badge-yt" id="platformTag">YT</span>
                    <span class="status-badge status-offline" id="agentBadge">
                        <span id="agentBadgeIcon">●</span> <span id="agentBadgeText">offline</span>
                    </span>
                    <button class="topbar-btn" onclick="downloadProject()" title="Baixar .txt">↓</button>
                    <button class="topbar-btn" onclick="confirmDelete()" title="Excluir">×</button>
                </div>
            </div>

            <!-- Content split: editor + AI -->
            <div class="content-split">
                <!-- Editor -->
                <div class="editor-pane">
                    <div class="editor-toolbar">
                        <button class="ed-btn" onclick="fmt('bold')" title="Negrito"><b>B</b></button>
                        <button class="ed-btn" onclick="fmt('italic')" title="Itálico"><i>I</i></button>
                        <button class="ed-btn" onclick="fmt('underline')" title="Sublinhado"><u>U</u></button>
                        <span class="ed-sep"></span>
                        <button class="ed-btn" onclick="fmt('formatBlock','H2')" title="Título">H</button>
                        <button class="ed-btn" onclick="fmt('insertUnorderedList')" title="Lista">≡</button>
                        <span class="ed-sep"></span>
                        <button class="ed-btn" onclick="copyEditorContent()" title="Copiar">⎘</button>
                    </div>
                    <div class="editor-scroll">
                        <div class="editor-canvas" id="editor" contenteditable="true" oninput="autoSave()"></div>
                    </div>
                    <div class="editor-status">
                        <div class="status-group">
                            <span><span id="wc">0</span> palavras</span>
                            <span>~<span id="rt">0</span> min leitura</span>
                        </div>
                        <div class="status-group">
                            <span id="saveIndicator">Salvo ✓</span>
                        </div>
                    </div>
                </div>

                <!-- AI Panel -->
                <div class="ai-pane" id="aiPane">
                    <div class="ai-header">
                        <span class="ai-header-title">Assistente IA</span>
                        <span class="status-badge status-online" id="ragBadge" style="display:none;">RAG · <span id="kbCount">0</span></span>
                    </div>
                    <div class="ai-body">
                        <!-- Platform -->
                        <div class="form-group">
                            <label>Plataforma</label>
                            <div class="platform-pills">
                                <button class="pill active" data-p="youtube" onclick="pickPlatform('youtube')">YouTube</button>
                                <button class="pill" data-p="instagram" onclick="pickPlatform('instagram')">Reels</button>
                                <button class="pill" data-p="carousel" onclick="pickPlatform('carousel')">Carrossel</button>
                            </div>
                        </div>
                        <!-- Topic -->
                        <div class="form-group">
                            <label>Tema</label>
                            <textarea id="topic" placeholder="Sobre o que será o conteúdo?" rows="2"></textarea>
                        </div>
                        <!-- Tone + Duration -->
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                            <div class="form-group">
                                <label>Tom</label>
                                <select id="tone">
                                    <option value="educativo">Educativo</option>
                                    <option value="storytelling">Storytelling</option>
                                    <option value="provocativo">Provocativo</option>
                                    <option value="motivacional">Motivacional</option>
                                    <option value="mito_verdade">Mito vs Verdade</option>
                                    <option value="lista">Lista / Tópicos</option>
                                </select>
                            </div>
                            <div class="form-group" id="durGroup">
                                <label>Duração</label>
                                <select id="dur">
                                    <option value="60">60s</option>
                                    <option value="180">3 min</option>
                                    <option value="300" selected>5 min</option>
                                    <option value="600">10 min</option>
                                    <option value="900">15+ min</option>
                                </select>
                            </div>
                        </div>
                        <!-- Quick prompts -->
                        <div class="form-group">
                            <label>Sugestões rápidas</label>
                            <div class="chips">
                                <button class="chip" onclick="setTopic('Tirzepatida para emagrecimento: o que ninguém te conta')">Tirzepatida</button>
                                <button class="chip" onclick="setTopic('Testosterona baixa: 5 sinais que todo homem ignora')">Testosterona</button>
                                <button class="chip" onclick="setTopic('Fadiga crônica e exames normais: causa oculta')">Fadiga crônica</button>
                                <button class="chip" onclick="setTopic('Resistência à insulina e ganho de peso')">Insulina</button>
                                <button class="chip" onclick="setTopic('Implantes hormonais: verdade vs indústria')">Implantes</button>
                            </div>
                        </div>
                        <!-- RAG toggle -->
                        <div class="toggle-row">
                            <label>Usar base de conhecimento (RAG)</label>
                            <input type="checkbox" class="toggle" id="useRag" checked>
                        </div>
                        <!-- AI Output (CodeDisplay-inspired) -->
                        <div class="ai-output-wrap" id="aiOutWrap">
                            <div class="ai-output-header">
                                <span>resultado</span>
                                <button onclick="copyAi()">Copiar</button>
                            </div>
                            <div class="ai-output" id="aiOut"></div>
                        </div>
                        <div class="ai-actions" id="aiActs">
                            <button class="btn btn-ghost btn-sm" onclick="insertToEditor()">Inserir no editor</button>
                            <button class="btn btn-ghost btn-sm" onclick="replaceEditor()">Substituir</button>
                            <button class="btn btn-ghost btn-sm" onclick="copyAi()">Copiar</button>
                        </div>
                    </div>
                    <div class="ai-footer">
                        <button class="btn btn-brand btn-full" id="genBtn" onclick="generate()">
                            Gerar conteúdo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile FABs -->
    <button class="mobile-fab fab-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">≡</button>
    <button class="mobile-fab fab-ai" onclick="document.getElementById('aiPane').classList.toggle('open')">IA</button>

    <!-- Delete modal -->
    <div class="modal-bg" id="delModal">
        <div class="modal">
            <h3>Excluir documento?</h3>
            <p>Essa ação não pode ser desfeita.</p>
            <div class="modal-btns">
                <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-danger btn-sm" onclick="deleteCurrentProject()">Excluir</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
