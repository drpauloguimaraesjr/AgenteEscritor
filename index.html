<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Studio</title>
    <meta name="description" content="Workspace de conteúdo médico com IA">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
</head>
<body>

    <div class="login-shell">
        <div class="login-card">
            <div class="login-header">
                <div class="login-lottie">
                    <lottie-player src="img/dna-loading.json" background="transparent" speed="0.7" style="width:80px;height:80px;" loop autoplay></lottie-player>
                </div>
                <h1>Creative Studio</h1>
                <p>Sua IA. Seus textos. Sua autenticidade.</p>
            </div>

            <div class="login-box">
                <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="login-error" id="loginError"></div>
                    
                    <!-- Normal login fields -->
                    <div id="loginFields">
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="username">Email ou usuário</label>
                            <input type="text" id="username" placeholder="usuario@email.com" autocomplete="username" required>
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="password">Senha</label>
                            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-brand btn-full" id="loginBtn">Entrar</button>
                        <button type="button" class="btn btn-ghost btn-full" id="googleBtn" style="margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; border: 1px solid var(--border); background: var(--bg-3);" onclick="handleGoogleLogin()">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Entrar com Google
                        </button>
                    </div>

                    <!-- Change password (shown after first login with temp password) -->
                    <div id="changePwFields" style="display:none;">
                        <div class="change-pw-notice show" style="margin-bottom:14px;">
                            Defina uma senha pessoal para continuar.
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="newPw1">Nova senha</label>
                            <input type="password" id="newPw1" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="newPw2">Confirmar senha</label>
                            <input type="password" id="newPw2" placeholder="Repita a senha">
                        </div>
                        <button type="button" class="btn btn-brand btn-full" onclick="handleSetPassword()">Definir senha e entrar</button>
                    </div>
                </form>
                <p class="login-hint">Primeiro acesso? Peça um convite ao administrador.</p>
            </div>
        </div>
    </div>

    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCXSRWuKfce3Pgp7w1R_ayhO_3EJ0T_tCc",
        authDomain: "docwriter-c55d1.firebaseapp.com",
        projectId: "docwriter-c55d1",
        storageBucket: "docwriter-c55d1.firebasestorage.app",
        messagingSenderId: "139708904074",
        appId: "1:139708904074:web:47aaa649ba715e10ca3373",
        measurementId: "G-549VEC0G2N"
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      const analytics = firebase.analytics();
    </script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'app.html';

        let pendingUser = null;

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            btn.classList.add('loading');
            btn.textContent = 'Verificando...';

            setTimeout(async () => {
                const result = await Auth.login(username, password);
                if (result.success) {
                    // Check if must change password
                    if (result.mustChangePassword) {
                        pendingUser = result.user;
                        document.getElementById('loginFields').style.display = 'none';
                        document.getElementById('changePwFields').style.display = 'block';
                        btn.classList.remove('loading');
                        btn.textContent = 'Entrar';
                    } else {
                        window.location.href = 'app.html';
                    }
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.add('show');
                    btn.classList.remove('loading');
                    btn.textContent = 'Entrar';
                }
            }, 400);
        }

        function handleSetPassword() {
            const pw1 = document.getElementById('newPw1').value;
            const pw2 = document.getElementById('newPw2').value;
            const errorEl = document.getElementById('loginError');

            if (pw1.length < 6) {
                errorEl.textContent = 'Senha muito curta (mín. 6 caracteres)';
                errorEl.classList.add('show');
                return;
            }
            if (pw1 !== pw2) {
                errorEl.textContent = 'As senhas não coincidem';
                errorEl.classList.add('show');
                return;
            }

            const tempPw = document.getElementById('password').value;
            Auth.changePassword(tempPw, pw1);
            Auth.clearMustChange(pendingUser.username);
            window.location.href = 'app.html';
        }

        async function handleGoogleLogin() {
            const btn = document.getElementById('googleBtn');
            const errorEl = document.getElementById('loginError');
            errorEl.classList.remove('show');
            btn.innerHTML = 'Conectando...';
            
            const result = await Auth.loginWithGoogle();
            if (result.success) {
                window.location.href = 'app.html';
            } else {
                errorEl.textContent = result.error;
                errorEl.classList.add('show');
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Entrar com Google';
            }
        }
    </script>
</body>
</html>
