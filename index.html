<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Studio</title>
    <meta name="description" content="Workspace de conteúdo médico com IA">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="login-header">
                <div class="login-lottie">
                    <lottie-player src="img/dna-loading.json" background="transparent" speed="0.7" style="width:64px;height:64px;" loop autoplay></lottie-player>
                </div>
                <h1>Content Studio</h1>
                <p>Sua IA. Seus textos. Sua autenticidade.</p>
            </div>

            <div class="login-box">
                <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="login-error" id="loginError"></div>
                    
                    <!-- Normal login fields -->
                    <div id="loginFields">
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="username">Email ou usuário</label>
                            <input type="text" id="username" placeholder="usuario@email.com" autocomplete="username" required>
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="password">Senha</label>
                            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-brand btn-full" id="loginBtn">Entrar</button>
                    </div>

                    <!-- Change password (shown after first login with temp password) -->
                    <div id="changePwFields" style="display:none;">
                        <div class="change-pw-notice show" style="margin-bottom:14px;">
                            ⚠️ Defina uma senha pessoal para continuar.
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="newPw1">Nova senha</label>
                            <input type="password" id="newPw1" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="form-group" style="margin-bottom:14px;">
                            <label for="newPw2">Confirmar senha</label>
                            <input type="password" id="newPw2" placeholder="Repita a senha" required>
                        </div>
                        <button type="button" class="btn btn-brand btn-full" onclick="handleSetPassword()">Definir senha e entrar</button>
                    </div>
                </form>
                <p class="login-hint">Primeiro acesso? Peça um convite ao administrador.</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'app.html';

        let pendingUser = null;

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            btn.classList.add('loading');
            btn.textContent = 'Verificando...';

            setTimeout(() => {
                const result = Auth.login(username, password);
                if (result.success) {
                    // Check if must change password
                    if (result.mustChangePassword) {
                        pendingUser = result.user;
                        document.getElementById('loginFields').style.display = 'none';
                        document.getElementById('changePwFields').style.display = 'block';
                        btn.classList.remove('loading');
                        btn.textContent = 'Entrar';
                    } else {
                        window.location.href = 'app.html';
                    }
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.add('show');
                    btn.classList.remove('loading');
                    btn.textContent = 'Entrar';
                }
            }, 400);
        }

        function handleSetPassword() {
            const pw1 = document.getElementById('newPw1').value;
            const pw2 = document.getElementById('newPw2').value;
            const errorEl = document.getElementById('loginError');

            if (pw1.length < 6) {
                errorEl.textContent = 'Senha muito curta (mín. 6 caracteres)';
                errorEl.classList.add('show');
                return;
            }
            if (pw1 !== pw2) {
                errorEl.textContent = 'As senhas não coincidem';
                errorEl.classList.add('show');
                return;
            }

            const tempPw = document.getElementById('password').value;
            Auth.changePassword(tempPw, pw1);
            Auth.clearMustChange(pendingUser.username);
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
