<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Studio — Login</title>
    <meta name="description" content="Plataforma de geração de conteúdo médico com IA local">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon">🧠</div>
                <h1>Content Studio</h1>
                <p>Sua IA. Seus textos. Sua autenticidade.</p>
            </div>
            
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="login-error" id="loginError"></div>
                
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Seu nome de usuário" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span>🔐</span> ENTRAR
                </button>
                
                <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px;">
                    Primeira vez? Use <strong>admin / admin123</strong>
                </p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = 'app.html';
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            btn.classList.add('loading');
            btn.innerHTML = '<span>⏳</span> VERIFICANDO...';

            // Small delay for UX
            setTimeout(() => {
                const result = Auth.login(username, password);
                if (result.success) {
                    window.location.href = 'app.html';
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.add('show');
                    btn.classList.remove('loading');
                    btn.innerHTML = '<span>🔐</span> ENTRAR';
                }
            }, 600);
        }
    </script>
</body>
</html>
